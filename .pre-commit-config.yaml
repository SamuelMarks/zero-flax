repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff Format
        entry: ruff format .
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-check
        name: Ruff Check (Fix)
        entry: ruff check --fix .
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-coverage
        name: Run Pytest Coverage
        entry: pytest --cov=. --cov-report=term-missing
        language: system
        types: [python]
        pass_filenames: false

      - id: api-compliance
        name: API Compliance Check
        entry: ml_framework_snapshots check flax src/zero_flax --reference-prefix flax --target-prefix zero_flax
        language: system
        pass_filenames: false

      - id: check-3rdparty-deps
        name: Check 3rd-party Dependencies
        entry: python3 scripts/check_deps.py
        language: system
        types: [python]
        files: ^src/

      - id: update-badges
        name: Update Coverage Shields
        entry: python3 scripts/update_badges.py
        language: system
        types: [python]
        pass_filenames: false


      - id: check-api-compliance
        name: Check API Conformance
        entry: env PYTHONPATH=src:../ml-switcheroo-compiler/src:../zero-jax/src:../zero-optax/src python3 scripts/check_compliance.py
        language: system
        files: ^(SEMANTIC_PLAN\.md|src/.*\.py)$
        pass_filenames: false

      - id: build
        name: Build Package
        entry: python3 -m build
        language: system
        pass_filenames: false
